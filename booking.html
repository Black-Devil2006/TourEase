<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Booking - TourEase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <ul>
      <li><a href="index.html">🏠 Home</a></li>
    </ul>
  </nav>

  <section id="booking">
  <h2>📝 Self Drive Booking</h2>
  <form id="bookingForm">
    <input type="text" placeholder="Full Name" required>
    <input type="tel" placeholder="Phone Number" required>
    <input type="text" placeholder="License Number" required>
    <input type="text" placeholder="Aadhaar Number" required>
    <input type="date" placeholder="Booking Date" required>
    <select required>
      <option value="">Select Vehicle</option>
      <option value="Sedan">Sedan</option>
      <option value="SUV">SUV</option>
      <option value="Scooter">Scooter</option>
      <option value="Motorbike">Motorbike</option>
    </select>
    <button type="submit">Confirm Booking</button>
  </form>
</section>


  <script src="script.js"></script>
</body>
</html>
