<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ride with Driver - TourEase</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <ul>
      <li><a href="index.html">🏠 Home</a></li>
    </ul>
  </nav>

  <section id="driverBooking">
    <h2>🚕 Book Ride with Driver</h2>
    <form id="driverBookingForm">
      <input type="text" placeholder="Pickup Location" required>
      <input type="text" placeholder="Drop Location" required>
      <input type="tel" placeholder="Phone Number" required>
      <select required>
        <option value="">Select Vehicle</option>
        <option value="Car">Car</option>
        <option value="Bike">Bike</option>
        <option value="Auto">Auto</option>
      </select>
      <button type="submit">Book Ride</button>
    </form>
  </section>

  <script src="script.js"></script>
</body>
</html>
